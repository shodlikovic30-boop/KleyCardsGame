<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Anime Studio Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --p: #4285f4; --s: #9b72f3; --bg: #050505; --card: #121212;
            --ssr: linear-gradient(45deg, #ffd700, #ffae00);
            --sr: linear-gradient(45deg, #9b72f3, #5035ff);
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden;
        }

        /* --- БОКОВОЕ МЕНЮ --- */
        nav {
            width: 80px; background: #000; border-right: 1px solid #222;
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 35px;
        }
        nav .icon {
            cursor: pointer; font-size: 28px; opacity: 0.4; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        nav .icon:hover, nav .icon.active { opacity: 1; color: var(--p); transform: scale(1.2); }

        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .section { display: none; width: 100%; height: 100%; flex-direction: column; overflow-y: auto; }
        .section.active { display: flex; }

        /* --- КИНОТЕАТР --- */
        .search-area { padding: 20px; background: #080808; display: flex; gap: 10px; border-bottom: 1px solid #222; }
        .search-area input {
            flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333;
            background: #000; color: #fff; outline: none; font-size: 16px;
        }
        #player-iframe { flex: 1; background: #000; border: none; }

        /* --- CARD MAKER --- */
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 40px; }
        
        #anime-card {
            width: 320px; height: 480px; background: #1a1a1a; border-radius: 24px;
            position: relative; overflow: hidden; border: 4px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .card-img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .card-frame {
            position: absolute; inset: 0; 
            border: 12px solid transparent; border-image-slice: 1;
            pointer-events: none;
        }
        .ssr-frame { border-image-source: var(--ssr); }
        
        .card-info {
            position: absolute; bottom: 0; width: 100%; padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95) 70%);
            box-sizing: border-box;
        }
        .rarity { position: absolute; top: 20px; right: 20px; font-weight: 900; font-size: 28px; font-style: italic; }

        /* --- PHOTO EDITOR --- */
        .editor-wrap { text-align: center; padding: 40px; }
        #preview-img { max-width: 80%; border-radius: 20px; margin: 20px 0; border: 2px solid #333; display: none; }
        .controls { display: grid; grid-template-columns: repeat(2, 200px); gap: 15px; justify-content: center; }
        .btn {
            padding: 12px; border-radius: 10px; border: none; background: #222;
            color: white; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: var(--p); }
        .btn-ai { background: linear-gradient(90deg, var(--p), var(--s)); grid-column: span 2; }

    </style>
</head>
<body>

    <nav>
        <div class="icon active" onclick="tab('cinema')" title="Кино">🎬</div>
        <div class="icon" onclick="tab('cards')" title="Аниме Карты">💎</div>
        <div class="icon" onclick="tab('editor')" title="Редактор">🎨</div>
    </nav>

    <main>
        <section id="cinema" class="section active">
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="Напиши название аниме (Enter для поиска)...">
            </div>
            <iframe id="player-iframe" allowfullscreen></iframe>
        </section>

        <section id="cards" class="section">
            <div class="card-container">
                <div id="anime-card">
                    <img id="card-img-preview" src="" class="card-img" style="display:none;">
                    <div id="frame-style" class="card-frame ssr-frame"></div>
                    <div class="card-info">
                        <div id="res-rarity" class="rarity" style="color:#ffd700">SSR</div>
                        <h2 id="res-name" style="margin:0; font-size:24px;">Имя Героя</h2>
                        <p id="res-stat" style="color:var(--p); margin:5px 0 0;">POWER: 99999</p>
                    </div>
                </div>

                <div style="max-width:300px; display:flex; flex-direction:column; gap:10px;">
                    <h3>Настройки Карты</h3>
                    <input type="file" id="cardFile" accept="image/*">
                    <input type="text" id="cardName" placeholder="Имя персонажа">
                    <input type="number" id="cardPower" placeholder="Сила">
                    <select id="cardRarity">
                        <option value="SSR">SSR (Золото)</option>
                        <option value="SR">SR (Фиолетовый)</option>
                        <option value="R">R (Обычный)</option>
                    </select>
                    <button class="btn btn-ai" onclick="saveCard()">СКАЧАТЬ КАРТУ</button>
                </div>
            </div>
        </section>

        <section id="editor" class="section">
            <div class="editor-wrap">
                <h2>AI Image Enhancer</h2>
                <input type="file" id="editFile" accept="image/*">
                <br>
                <img id="preview-img">
                <div class="controls">
                    <button class="btn btn-ai" onclick="enhance()">✨ УЛУЧШИТЬ (4K AI MODE)</button>
                    <button class="btn" onclick="applyFilter('contrast(1.5) saturate(1.5)')">Vivid</button>
                    <button class="btn" onclick="applyFilter('grayscale(1)')">Manga Style</button>
                    <button class="btn" onclick="resetFilter()">Сброс</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Переключение вкладок
        function tab(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.icon').forEach(i => i.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- ЛОГИКА КИНО ---
        document.getElementById('searchInput').onkeypress = function(e) {
            if(e.key === 'Enter') {
                document.getElementById('player-iframe').src = `https://p2p.kodik.biz/find?title=${encodeURIComponent(this.value)}`;
            }
        };

        // --- ЛОГИКА КАРТ ---
        const cardFile = document.getElementById('cardFile');
        cardFile.onchange = e => {
            const reader = new FileReader();
            reader.onload = () => { 
                const img = document.getElementById('card-img-preview');
                img.src = reader.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // Живое обновление текста на карте
        document.querySelectorAll('input, select').forEach(el => {
            el.oninput = () => {
                document.getElementById('res-name').innerText = document.getElementById('cardName').value || "Имя Героя";
                document.getElementById('res-stat').innerText = "POWER: " + (document.getElementById('cardPower').value || "0");
                const rarity = document.getElementById('cardRarity').value;
                const rText = document.getElementById('res-rarity');
                const frame = document.getElementById('frame-style');
                
                rText.innerText = rarity;
                frame.className = 'card-frame ' + (rarity === 'SSR' ? 'ssr-frame' : (rarity === 'SR' ? 'sr-frame' : ''));
                rText.style.color = (rarity === 'SSR' ? '#ffd700' : (rarity === 'SR' ? '#9b72f3' : '#fff'));
            };
        });

        function saveCard() {
            html2canvas(document.getElementById('anime-card'), { useCORS: true }).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL();
                a.download = 'anime-card.png';
                a.click();
            });
        }

        // --- ЛОГИКА РЕДАКТОРА ---
        const editFile = document.getElementById('editFile');
        const previewImg = document.getElementById('preview-img');

        editFile.onchange = e => {
            const reader = new FileReader();
            reader.onload = () => { 
                previewImg.src = reader.result;
                previewImg.style.display = 'inline-block';
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function enhance() {
            previewImg.style.filter = "contrast(1.2) saturate(1.3) brightness(1.1) sharp";
            alert("ИИ улучшил четкость и цвета эдита!");
        }

        function applyFilter(f) { previewImg.style.filter = f; }
        function resetFilter() { previewImg.style.filter = 'none'; }

    </script>
</body>
</html>
