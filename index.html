<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KleyCardsGame</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
    }

    header {
      background: #181818;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .logo {
      font-size: 28px;
      color: #8b5cf6;
      font-weight: bold;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #8b5cf6;
    }

    .hero {
      height: 400px;
      background: url('https://images.unsplash.com/photo-1541562232579-512a21360020?q=80&w=1200') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-content {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 20px;
    }

    .hero h1 {
      font-size: 50px;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      background: #8b5cf6;
      color: white;
      padding: 12px 25px;
      border-radius: 12px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #6d28d9;
    }

    .section {
      padding: 40px 30px;
    }

    .section h2 {
      margin-bottom: 20px;
      color: #8b5cf6;
    }

    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1b1b1b;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h3 {
      margin-bottom: 10px;
    }

    footer {
      background: #181818;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      color: #999;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">AnimeWorld</div>

  <nav>
    <a href="#">Главная</a>
    <a href="#">Аниме</a>
    <a href="#">Новинки</a>
    <a href="#">Топ</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Смотри Аниме Онлайн</h1>
    <p>Лучшие тайтлы в Full HD</p>

    <a href="#anime" class="btn">Смотреть</a>
  </div>
</section>

<section class="section" id="anime">
  <h2>Популярное</h2>

  <div class="anime-grid">

    <div class="card">
      <img src="https://picsum.photos/300/400?1">

      <div class="card-content">
        <h3>Naruto</h3>
        <p>Приключения ниндзя.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/400?2">

      <div class="card-content">
        <h3>One Piece</h3>
        <p>Пираты и сокровища.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/400?3">

      <div class="card-content">
        <h3>Attack on Titan</h3>
        <p>Битва с титанами.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/400?4">

      <div class="card-content">
        <h3>Demon Slayer</h3>
        <p>Охотники на демонов.</p>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 KleyCardsGame 
</footer>

</body>
</html>
