<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime Search WebApp</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #000; color: #fff; margin: 0; padding: 15px; overflow-x: hidden;
        }
        h2 { color: #fff; font-size: 1.2rem; margin-bottom: 15px; }
        .search-container { display: flex; gap: 8px; margin-bottom: 15px; }
        input { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; 
            background: #1c1c1e; color: #fff; outline: none; font-size: 16px;
        }
        button { 
            padding: 12px 18px; background: #007aff; border: none; color: #fff; 
            border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:active { background: #0056b3; transform: scale(0.95); }
        #status { font-size: 14px; color: #8e8e93; margin-bottom: 10px; min-height: 20px; }
        #player-wrapper { 
            width: 100%; border-radius: 12px; overflow: hidden; 
            background: #1c1c1e; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        iframe { width: 100%; height: 60vh; border: none; }
    </style>
</head>
<body>

    <h2>Найти аниме</h2>
    <div class="search-container">
        <input type="text" id="animeTitle" placeholder="Название (например, Наруто)">
        <button onclick="searchAnime()">Найти</button>
    </div>

    <div id="status">Введите название и выберите озвучку</div>

    <div id="player-wrapper">
        <iframe id="player" src="" allowfullscreen></iframe>
    </div>

    <script>
        async function searchAnime() {
            const title = document.getElementById('animeTitle').value;
            const status = document.getElementById('status');
            const wrapper = document.getElementById('player-wrapper');
            const player = document.getElementById('player');

            if (!title) {
                status.innerText = "⚠️ Введите название!";
                return;
            }

            status.innerText = "⏳ Поиск в базах озвучек...";
            wrapper.style.display = 'none';

            try {
                // Используем Shikimori API для точного поиска названия
                const response = await fetch(`https://shikimori.one/api/animes?search=${encodeURIComponent(title)}&limit=1`);
                const data = await response.json();

                if (data.length > 0) {
                    const anime = data[0];
                    status.innerHTML = `🎬 Найдено: <b>${anime.russian || anime.name}</b>`;
                    
                    // Формируем ссылку на базу Kodik (она содержит AniLibria, AniDub и др.)
                    // Поиск идет по названию
                    const videoUrl = `https://kodik.info/find?title=${encodeURIComponent(anime.russian || anime.name)}`;
                    
                    player.src = videoUrl;
                    wrapper.style.display = 'block';
                } else {
                    status.innerText = "❌ Ничего не нашли. Попробуй другое название.";
                }
            } catch (err) {
                status.innerText = "❌ Ошибка сети. Проверьте интернет.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
