name: NodeJS with Webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build
      run: |
        # If package.json is present at the repository root, run the normal Node build.
        # Otherwise skip the npm install/build to avoid ENOENT errors in repos that are static sites.
        if [ -f package.json ]; then
          echo "Found package.json in repository root — running npm ci and webpack"
          npm ci
          npx webpack
        else
          echo "No package.json found at repo root. Skipping npm install and webpack build."
          echo "If your project has package.json in a subdirectory, update this workflow to cd into that folder or set working-directory."
        fi
